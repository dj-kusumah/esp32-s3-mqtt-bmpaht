; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- PENTING UNTUK N16R8 (16MB Flash + 8MB PSRAM) ---
; Mengaktifkan PSRAM (OPI)
board_build.arduino.memory_type = qio_opi
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Debug via USB JTAG bawaan ESP32-S3
; NOTE: Board ini tidak punya akses ke USB native ESP32-S3,
; jadi esp-builtin JTAG tidak bisa dipakai.
; Butuh external JTAG adapter (ESP-Prog) untuk debug.

; Mengaktifkan Flash 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; Setting Monitor Serial (Supaya tidak keluar huruf alien)
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Setting Upload (Supaya mode USB-C terdeteksi otomatis)
upload_protocol = esptool

; Library dependencies
lib_deps =
    knolleary/PubSubClient@^2.8.0
    adafruit/Adafruit AHTX0@^2.0.5
    adafruit/Adafruit BMP280 Library@^2.6.8
    adafruit/Adafruit Unified Sensor@^1.1.14

; Filesystem untuk file HTML/CSS/JS (Bootstrap + Chart.js)
board_build.filesystem = littlefs
